services:
  - type: web
    name: usdtry-epsilon-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: R_TRY
        value: "0.40"
      - key: R_USD_FALLBACK
        value: "0.0364"
      - key: FRED_API_KEY
        sync: false   # you'll set this in the Render dashboard — never commit keys
    healthCheckPath: /health
