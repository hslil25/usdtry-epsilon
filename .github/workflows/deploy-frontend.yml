name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write   # gh-pages needs to push to the gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          # Override the API URL at build time with the Render backend URL.
          # Set this secret in: GitHub repo → Settings → Secrets → Actions
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Deploy to gh-pages
        working-directory: frontend
        run: npx gh-pages -d dist -t true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
